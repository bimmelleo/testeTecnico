<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Sistema Posto</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>Sistema de Posto</h1>

<div class="container">

    <div>
        <div class="card">
            <h2>Tipo Combustível</h2>

            <input type="number" id="tipoIdEdit" placeholder="ID (update/delete)">
            <input type="text" id="tipoNome" placeholder="Nome">
            <input type="number" id="tipoPreco" step="0.01" placeholder="Preço">

            <div class="actions">
                <button onclick="criarTipo()">Criar</button>
                <button onclick="atualizarTipo()">Atualizar</button>
                <button onclick="deletarTipo()">Deletar</button>
            </div>
        </div>

        <div class="card">
            <h3>Lista Tipos</h3>
            <ul id="listaTipos"></ul>
        </div>
    </div>

    <div>
        <div class="card">
            <h2>Bomba</h2>

            <input type="number" id="bombaIdEdit" placeholder="ID (update/delete)">
            <input type="text" id="bombaNome" placeholder="Nome">

            <select id="tipoSelect"></select>

            <div class="actions">
                <button onclick="criarBomba()">Criar</button>
                <button onclick="atualizarBomba()">Atualizar</button>
                <button onclick="deletarBomba()">Deletar</button>
            </div>
        </div>

        <div class="card">
            <h3>Lista Bombas</h3>
            <ul id="listaBombas"></ul>
        </div>
    </div>

    <div>
        <div class="card">
            <h2>Abastecimento</h2>

            <input type="number" id="abastIdEdit" placeholder="ID (update/delete)">
            <select id="bombaSelect"></select>
            <input type="number" id="quant" placeholder="Quantidade">

            <div class="actions">
                <button onclick="criarAbastecimento()">Criar</button>
                <button onclick="atualizarAbastecimento()">Atualizar</button>
                <button onclick="deletarAbastecimento()">Deletar</button>
            </div>
        </div>

        <div class="card">
            <h3>Lista Abastecimentos</h3>
            <ul id="listaAbastecimentos"></ul>
        </div>
    </div>

</div>

<!--baixo conhecimento em JavaScrip e pouco tempo para aprender,
    //uso de Inteligência Artificial completo para
    //realizar esta parte-->
<script>
    const API_TIPO = "http://localhost:8080/tipos";
    const API_BOMBA = "http://localhost:8080/bombas";
    const API_ABAST = "http://localhost:8080/abastecimentos";

    function getNumber(value) {
        return value ? parseFloat(value) : null;
    }

    function getInt(value) {
        return value ? parseInt(value) : null;
    }

    async function request(url, options) {
        const res = await fetch(url, options);

        if (!res.ok) {
            const text = await res.text();
            alert("Erro: " + text);
            throw new Error(text);
        }

        return res;
    }

    //conexões para funcionalidades de TIPOS
    async function criarTipo() {
        const preco = getNumber(tipoPreco.value);

        if (!tipoNome.value || preco === null) {
            return alert("Preencha nome e preço");
        }

        await request(API_TIPO, {
            method:"POST",
            headers:{"Content-Type":"application/json"},
            body:JSON.stringify({
                name: tipoNome.value,
                precoComb: preco
            })
        });

        listarTipos();
    }

    async function atualizarTipo() {
        const id = getInt(tipoIdEdit.value);
        const preco = getNumber(tipoPreco.value);

        if (!id) return alert("Informe o ID");

        await request(`${API_TIPO}/${id}`, {
            method:"PUT",
            headers:{"Content-Type":"application/json"},
            body:JSON.stringify({
                name: tipoNome.value,
                precoComb: preco
            })
        });

        listarTipos();
    }

    async function deletarTipo() {
        const id = getInt(tipoIdEdit.value);
        if (!id) return alert("Informe o ID");

        await request(`${API_TIPO}/${id}`, { method:"DELETE" });

        listarTipos();
    }

    //conexões para funcionalidades de BOMBAS
    async function criarBomba() {
        const tipoId = getInt(tipoSelect.value);

        if (!bombaNome.value || !tipoId) {
            return alert("Preencha nome e tipo");
        }

        await request(API_BOMBA, {
            method:"POST",
            headers:{"Content-Type":"application/json"},
            body:JSON.stringify({
                name: bombaNome.value,
                tipoCombId: tipoId
            })
        });

        listarBombas();
    }

    async function atualizarBomba() {
        const id = getInt(bombaIdEdit.value);
        const tipoId = getInt(tipoSelect.value);

        if (!id) return alert("Informe o ID");

        await request(`${API_BOMBA}/${id}`, {
            method:"PUT",
            headers:{"Content-Type":"application/json"},
            body:JSON.stringify({
                name: bombaNome.value,
                tipoCombId: tipoId
            })
        });

        listarBombas();
    }

    async function deletarBomba() {
        const id = getInt(bombaIdEdit.value);
        if (!id) return alert("Informe o ID");

        await request(`${API_BOMBA}/${id}`, { method:"DELETE" });

        listarBombas();
    }

    //conexões para funcionalidades de ABASTECIMENTOS
    async function criarAbastecimento() {
        const bombaId = getInt(bombaSelect.value);
        const quantidade = getNumber(quant.value);

        if (!bombaId || quantidade === null) {
            return alert("Preencha bomba e quantidade");
        }

        await request(`${API_ABAST}/bomba/${bombaId}`, {
            method:"POST",
            headers:{"Content-Type":"application/json"},
            body:JSON.stringify({
                quant: quantidade
            })
        });

        listarAbastecimentos();
    }

    async function atualizarAbastecimento() {
        const id = getInt(abastIdEdit.value);
        const quantidade = getNumber(quant.value);

        if (!id) return alert("Informe o ID");

        await request(`${API_ABAST}/${id}`, {
            method:"PUT",
            headers:{"Content-Type":"application/json"},
            body:JSON.stringify({
                quant: quantidade
            })
        });

        listarAbastecimentos();
    }

    async function deletarAbastecimento() {
        const id = getInt(abastIdEdit.value);
        if (!id) return alert("Informe o ID");

        await request(`${API_ABAST}/${id}`, { method:"DELETE" });

        listarAbastecimentos();
    }

    //listagem automática do Banco de Dados
    async function listarTipos() {
        const res = await fetch(API_TIPO);
        const dados = await res.json();

        listaTipos.innerHTML = "";
        tipoSelect.innerHTML = "";

        dados.forEach(t => {
            listaTipos.innerHTML += `<li>ID:${t.id} | ${t.name} - R$ ${t.precoComb}</li>`;
            tipoSelect.innerHTML += `<option value="${t.id}">${t.name}</option>`;
        });
    }

    async function listarBombas() {
        const res = await fetch(API_BOMBA);
        const dados = await res.json();

        listaBombas.innerHTML = "";
        bombaSelect.innerHTML = "";

        dados.forEach(b => {
            listaBombas.innerHTML += `
                <li>
                    ID:${b.id} | ${b.name}
                    (${b.tipoComb?.name || "Sem tipo"})
                </li>`;

            bombaSelect.innerHTML += `<option value="${b.id}">${b.name}</option>`;
        });
    }

    async function listarAbastecimentos() {
        const res = await fetch(API_ABAST);
        const dados = await res.json();

        listaAbastecimentos.innerHTML = "";

        dados.forEach(a => {
            const data = a.date ? new Date(a.date).toLocaleString("pt-BR") : "Sem data";

            listaAbastecimentos.innerHTML += `
                <li>
                    ID:${a.id} | Quant:${a.quant} | Valor:${a.valor} <br>
                    Data: ${data} <br>
                    Bomba: ${a.bomba?.name || "?"}
                    (${a.bomba?.tipoComb?.name || "?"})
                </li>`;
        });
    }

    // INIT
    listarTipos();
    listarBombas();
    listarAbastecimentos();
</script>

</body>
</html>
